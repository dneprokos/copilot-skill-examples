<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-labelledby="title desc">
  <title id="title">Copilot skills workflow</title>
  <desc id="desc">Modular SKILL.md files flow from your repository into an assistant, producing guided workflows.</desc>
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f8fa"/>
      <stop offset="100%" style="stop-color:#eaeef2"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
  </defs>
  <!-- Framed panel: readable on light and dark GitHub README backgrounds -->
  <rect width="720" height="200" fill="#f6f8fa" rx="12"/>
  <rect x="8" y="8" width="704" height="184" fill="#ffffff" stroke="#d0d7de" stroke-width="1" rx="8"/>
  <!-- Skill cards (left) -->
  <g transform="translate(32, 36)">
    <rect width="168" height="44" rx="6" fill="url(#cardGrad)" stroke="#d0d7de" stroke-width="1"/>
    <rect x="10" y="12" width="20" height="20" rx="4" fill="#1a7f37"/>
    <text x="40" y="28" fill="#24292f" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">SKILL.md</text>
  </g>
  <g transform="translate(32, 92)">
    <rect width="168" height="44" rx="6" fill="url(#cardGrad)" stroke="#d0d7de" stroke-width="1"/>
    <rect x="10" y="12" width="20" height="20" rx="4" fill="#8250df"/>
    <text x="40" y="28" fill="#24292f" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">Skill pack</text>
  </g>
  <g transform="translate(32, 148)">
    <rect width="168" height="44" rx="6" fill="url(#cardGrad)" stroke="#d0d7de" stroke-width="1"/>
    <rect x="10" y="12" width="20" height="20" rx="4" fill="#9a6700"/>
    <text x="40" y="28" fill="#24292f" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">scripts / refs</text>
  </g>
  <!-- Arrows -->
  <path d="M 210 100 L 268 100" stroke="#0969da" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="276,100 262,92 262,108" fill="#0969da"/>
  <!-- Assistant / IDE panel -->
  <g transform="translate(288, 28)">
    <rect width="400" height="144" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <rect x="0" y="0" width="400" height="28" rx="10" fill="#eaeef2"/>
    <rect x="0" y="18" width="400" height="10" fill="#eaeef2"/>
    <circle cx="20" cy="14" r="5" fill="#ff8182"/>
    <circle cx="38" cy="14" r="5" fill="#d4a72c"/>
    <circle cx="56" cy="14" r="5" fill="#4ac26b"/>
    <text x="200" y="19" fill="#57606a" font-family="system-ui, Segoe UI, sans-serif" font-size="11" text-anchor="middle">Your prompt</text>
    <rect x="20" y="44" width="360" height="56" rx="6" fill="url(#panelGrad)" opacity="0.12"/>
    <rect x="20" y="44" width="360" height="56" rx="6" fill="none" stroke="#0969da" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="200" y="78" fill="#24292f" font-family="system-ui, Segoe UI, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Guided workflow</text>
    <text x="200" y="98" fill="#57606a" font-family="system-ui, Segoe UI, sans-serif" font-size="11" text-anchor="middle">Copy skills to .github/skills/</text>
    <text x="200" y="152" fill="#6e7781" font-family="system-ui, Segoe UI, sans-serif" font-size="10" text-anchor="middle">Prompt - structured steps - output</text>
  </g>
</svg>
